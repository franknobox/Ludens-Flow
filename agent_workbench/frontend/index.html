<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ludens-Flow · 游戏开发工作台</title>
  <style>
    :root {
      --sidebar-bg: #252526;
      --sidebar-text: #cccccc;
      --sidebar-hover: #2a2d2e;
      --sidebar-active: #094771;
      --right-bg: #1e1e1e;
      --panel-bg: #fff;
      --border: #e5e6eb;
      --primary: #3370ff;
      --primary-hover: #2b5fd9;
      --text: #1f2329;
      --text-secondary: #8f959e;
      --avatar-bg: #e5e6eb;
      --user-msg-bg: #e8f3ff;
      --agent-msg-bg: #f2f3f5;
      --radius: 6px;
      --font-mono: "SF Mono", "Consolas", "Monaco", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 14px; color: var(--text); background: var(--right-bg); height: 100vh; display: flex; overflow: hidden; }
    /* 左侧：文件资源管理器 */
    .file-explorer { width: 220px; min-width: 180px; background: var(--sidebar-bg); color: var(--sidebar-text); display: flex; flex-direction: column; border-right: 1px solid #333; flex-shrink: 0; }
    .file-explorer .title { padding: 12px 16px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #888; }
    .file-explorer .file-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .file-explorer .file-item { padding: 6px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .file-explorer .file-item:hover { background: var(--sidebar-hover); }
    .file-explorer .file-item.active { background: var(--sidebar-active); color: #fff; }
    .file-explorer .file-item .icon { opacity: .8; }
    .file-explorer .footer { padding: 8px 12px; border-top: 1px solid #333; }
    .file-explorer .footer .btn { width: 100%; padding: 6px 10px; border-radius: var(--radius); border: none; background: transparent; color: var(--sidebar-text); cursor: pointer; font-size: 12px; text-align: left; }
    .file-explorer .footer .btn:hover { background: var(--sidebar-hover); }
    /* 右侧：文件预览 + 对话 */
    .right-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--panel-bg); }
    .file-viewer { flex: 0 0 320px; min-height: 200px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; background: #fff; }
    .file-viewer .viewer-header { padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between; }
    .file-viewer .viewer-content { flex: 1; overflow: auto; padding: 16px; font-family: var(--font-mono); font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .file-viewer .viewer-empty { color: var(--text-secondary); padding: 24px 16px; font-size: 13px; }
    .chat-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .chat-header .phase { font-weight: 500; }
    .chat-header .phase-badge { padding: 4px 10px; background: #e8f3ff; border-radius: var(--radius); font-size: 12px; color: var(--primary); }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; gap: 12px; max-width: 82%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; }
    .msg.user .avatar { background: var(--primary); color: #fff; }
    .msg .bubble { padding: 10px 14px; border-radius: var(--radius); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
    .msg.agent .bubble { background: var(--agent-msg-bg); }
    .msg.user .bubble { background: var(--user-msg-bg); }
    .msg .sender { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
    .msg .content { white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .msg.user .bubble .img-count { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
    .input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: #fafafa; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-row textarea { flex: 1; min-height: 40px; max-height: 100px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); resize: none; font-family: inherit; font-size: 14px; background: #fff; }
    .input-row textarea:focus { outline: none; border-color: var(--primary); }
    .input-row .send { background: var(--primary); color: #fff; padding: 8px 18px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
    .input-row .send:hover { background: var(--primary-hover); }
    .input-row .send:disabled { opacity: .6; cursor: not-allowed; }
    .attach-btn { padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 12px; color: var(--text-secondary); }
    .attach-btn:hover { border-color: var(--primary); color: var(--primary); }
    input[type="file"] { display: none; }
    .attach-row { margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .preview-list { display: flex; gap: 6px; flex-wrap: wrap; }
    .preview-item { position: relative; width: 48px; height: 48px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove { position: absolute; top: 1px; right: 1px; width: 16px; height: 16px; border: none; border-radius: 50%; background: rgba(0,0,0,.5); color: #fff; cursor: pointer; font-size: 11px; line-height: 1; padding: 0; }
    .decision-bar { margin-top: 10px; padding: 10px; background: #fff; border-radius: var(--radius); border: 1px solid var(--border); }
    .decision-bar p { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .decision-bar .btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .decision-bar .btns button { padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 12px; }
    .decision-bar .btns button:hover { border-color: var(--primary); color: var(--primary); }
    .error { color: #f53f3f; font-size: 12px; margin-top: 6px; }
    .loading { opacity: .7; pointer-events: none; }
  </style>
</head>
<body>
  <aside class="file-explorer">
    <div class="title">工作区 / workspace</div>
    <div class="file-list" id="fileList"></div>
    <div class="footer">
      <button type="button" class="btn" id="btnReset">重置会话</button>
    </div>
  </aside>
  <div class="right-panel">
    <section class="file-viewer">
      <div class="viewer-header">
        <span id="viewerTitle">未选择文件</span>
      </div>
      <div class="viewer-content" id="viewerContent">
        <div class="viewer-empty" id="viewerEmpty">在左侧选择 Agent 产出的文件查看内容</div>
      </div>
    </section>
    <section class="chat-panel">
      <header class="chat-header">
        <span class="phase">当前阶段：</span>
        <span class="phase-badge" id="phaseName">—</span>
      </header>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea id="input" placeholder="输入消息，回车发送；可添加图片..." rows="1"></textarea>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/jpg" multiple hidden>
          <button type="button" class="attach-btn" id="attachBtn" title="添加图片">📷</button>
          <button type="button" class="btn send" id="send">发送</button>
        </div>
        <div class="attach-row" id="attachRow" style="display:none;">
          <span style="font-size:12px;color:var(--text-secondary);">已选：</span>
          <div class="preview-list" id="previewList"></div>
        </div>
        <div class="decision-bar" id="decisionBar" style="display:none;">
          <p>评审完成，请选择：</p>
          <div class="btns">
            <button type="button" data-choice="a">A：按评审意见回到对应阶段修改</button>
            <button type="button" data-choice="b">B：仅修改 BLOCK/MAJOR 问题</button>
            <button type="button" data-choice="c">C：通过，进入开发辅导</button>
          </div>
        </div>
        <div class="error" id="error"></div>
      </div>
    </section>
  </div>
  <script>
    const API = '';
    const phaseLabel = {
      GDD_DISCUSS: 'GDD 讨论', GDD_COMMIT: 'GDD 定稿', PM_DISCUSS: 'PM 讨论', PM_COMMIT: 'PM 定稿',
      ENG_DISCUSS: '工程讨论', ENG_COMMIT: '工程定稿', REVIEW: '评审', POST_REVIEW_DECISION: '等待您的选择',
      DEV_COACHING: '开发辅导'
    };
    const phaseToAgentName = (p) => ({ GDD: 'Dam 丹姆', PM: 'Pax 帕克斯', ENG: 'Eon 伊恩', REVIEW: 'Revs 雷夫斯' }[
      p && (p.startsWith('GDD') ? 'GDD' : p.startsWith('PM') ? 'PM' : p.startsWith('ENG') || p === 'DEV_COACHING' ? 'ENG' : 'REVIEW')
    ] || '同事');

    function el(id) { return document.getElementById(id); }

    function setPhase(phase) {
      el('phaseName').textContent = phaseLabel[phase] || phase || '—';
    }

    function appendMessage(role, content, senderLabel, imageCount) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;
      const name = role === 'user' ? '我' : (senderLabel || '同事');
      let bubbleInner = '<div class="content"></div>';
      if (role === 'user' && imageCount > 0) bubbleInner += '<div class="img-count">📷 ' + imageCount + ' 张图片</div>';
      wrap.innerHTML = '<div class="avatar">' + (role === 'user' ? '我' : (senderLabel ? senderLabel[0] : '?')) + '</div><div><div class="sender">' + name + '</div><div class="bubble">' + bubbleInner + '</div></div>';
      wrap.querySelector('.content').textContent = content || (imageCount > 0 ? '[图片]' : '');
      el('messages').appendChild(wrap);
      wrap.scrollIntoView({ behavior: 'smooth' });
    }

    function showDecision(show) { el('decisionBar').style.display = show ? 'block' : 'none'; }
    function setError(msg) { el('error').textContent = msg || ''; }

    async function loadFileList() {
      const r = await fetch(API + '/api/workspace/files');
      const { files } = await r.json();
      const list = el('fileList');
      list.innerHTML = '';
      files.forEach(f => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.dataset.id = f.id;
        div.innerHTML = '<span class="icon">📄</span><span>' + f.name + '</span>';
        div.onclick = () => selectFile(f.id);
        list.appendChild(div);
      });
    }

    let selectedFileId = null;
    async function selectFile(id) {
      selectedFileId = id;
      const list = el('fileList');
      list.querySelectorAll('.file-item').forEach(n => n.classList.toggle('active', n.dataset.id === id));
      const content = el('viewerContent');
      content.innerHTML = '<span class="viewer-empty">加载中…</span>';
      try {
        const r = await fetch(API + '/api/workspace/files/' + encodeURIComponent(id) + '/content');
        const d = await r.json();
        el('viewerTitle').textContent = d.name;
        const pre = document.createElement('pre');
        pre.style.margin = '0';
        pre.style.whiteSpace = 'pre-wrap';
        pre.style.wordBreak = 'break-word';
        pre.textContent = d.content || '(空文件)';
        content.innerHTML = '';
        content.appendChild(pre);
      } catch (e) {
        content.innerHTML = '<div class="viewer-empty">加载失败</div>';
      }
    }

    function clearViewer() {
      selectedFileId = null;
      el('fileList').querySelectorAll('.file-item').forEach(n => n.classList.remove('active'));
      el('viewerTitle').textContent = '未选择文件';
      const content = el('viewerContent');
      content.innerHTML = '';
      const empty = document.createElement('div');
      empty.id = 'viewerEmpty';
      empty.className = 'viewer-empty';
      empty.textContent = '在左侧选择 Agent 产出的文件查看内容';
      content.appendChild(empty);
    }

    async function loadState() {
      const r = await fetch(API + '/api/state');
      const s = await r.json();
      setPhase(s.phase);
      const history = s.chat_history || [];
      el('messages').innerHTML = '';
      history.forEach(h => {
        const role = h.role === 'user' ? 'user' : 'agent';
        appendMessage(role, h.content, role === 'agent' ? '同事' : null, 0);
      });
      showDecision(s.phase === 'POST_REVIEW_DECISION');
      return s;
    }

    let pendingImages = [];
    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function renderPreviews() {
      const list = el('previewList');
      list.innerHTML = '';
      pendingImages.forEach((dataUrl, i) => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        const img = document.createElement('img');
        img.src = dataUrl;
        img.alt = '';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'remove';
        btn.textContent = '×';
        btn.onclick = () => { pendingImages.splice(i, 1); renderPreviews(); };
        div.appendChild(img);
        div.appendChild(btn);
        list.appendChild(div);
      });
      el('attachRow').style.display = pendingImages.length ? 'flex' : 'none';
    }

    async function sendMessage(msg) {
      const hasImages = pendingImages.length > 0;
      if (!msg.trim() && !hasImages) return;
      appendMessage('user', msg, null, pendingImages.length);
      const imagesToSend = pendingImages.slice();
      pendingImages = [];
      renderPreviews();
      el('input').value = '';
      el('send').disabled = true;
      el('input').closest('.input-area').classList.add('loading');
      setError('');
      try {
        const body = { message: msg || '' };
        if (imagesToSend.length) body.images = imagesToSend;
        const r = await fetch(API + '/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const d = await r.json();
        setPhase(d.phase);
        if (d.error) setError(d.error);
        if (d.reply) appendMessage('agent', d.reply, phaseToAgentName(d.phase), 0);
        showDecision(d.needs_decision === true);
        await loadFileList();
        if (selectedFileId) await selectFile(selectedFileId);
      } catch (e) {
        setError('请求失败: ' + e.message);
      }
      el('send').disabled = false;
      el('input').closest('.input-area').classList.remove('loading');
    }

    async function sendChoice(choice) {
      await sendMessage(choice);
      showDecision(false);
    }

    async function reset() {
      if (!confirm('确定要重置会话吗？将清空当前进度。')) return;
      await fetch(API + '/api/reset', { method: 'POST' });
      clearViewer();
      await loadFileList();
      await loadState();
      setError('');
    }

    el('attachBtn').addEventListener('click', () => el('fileInput').click());
    el('fileInput').addEventListener('change', async function() {
      const files = Array.from(this.files || []);
      this.value = '';
      for (const f of files) {
        if (!f.type.startsWith('image/')) continue;
        try { pendingImages.push(await readFileAsDataUrl(f)); } catch (_) {}
      }
      renderPreviews();
    });
    el('send').addEventListener('click', () => sendMessage(el('input').value));
    el('input').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(el('input').value); } });
    el('btnReset').addEventListener('click', reset);
    el('decisionBar').querySelectorAll('.btns button').forEach(btn => {
      btn.addEventListener('click', () => sendChoice(btn.dataset.choice));
    });

    (async function init() {
      await loadFileList();
      await loadState();
    })();
  </script>
</body>
</html>
