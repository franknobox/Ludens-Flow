<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ludens-Flow Workbench</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --line: #dde3eb;
      --text: #1f2937;
      --muted: #738196;
      --primary: #2f63ff;
      --primary-weak: #e7efff;
      --danger: #e5484d;
      --user-bubble: #e9f2ff;
      --agent-bubble: #f0f2f5;
      --side-bg: #1f2937;
      --side-text: #e6edf5;
      --side-muted: #9aa4b2;
      --radius: 10px;
      --mono: Consolas, Monaco, "Courier New", monospace;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .app {
      position: fixed;
      inset: 0;
      height: 100vh;
      display: grid;
      grid-template-columns: clamp(180px, 20vw, 260px) minmax(0, 1fr) clamp(180px, 20vw, 260px);
      overflow: hidden;
    }

    .sidebar {
      background: var(--side-bg);
      color: var(--side-text);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .sidebar.right {
      border-right: none;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
    }

    .side-head {
      padding: 14px 12px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: var(--side-muted);
      text-transform: uppercase;
    }

    .side-list {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .side-foot {
      padding: 10px 8px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: flex-start;
    }
    .reset-btn {
      width: 74px;
      height: 30px;
      border: 1px solid #b91c1c;
      border-radius: 6px;
      background: #dc2626;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
    }
    .reset-btn:hover { background: #b91c1c; }

    .side-item {
      width: 100%;
      text-align: left;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--side-text);
      padding: 9px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .side-item:hover { background: rgba(255, 255, 255, 0.08); }
    .side-item.active {
      background: rgba(47, 99, 255, 0.22);
      border-color: rgba(47, 99, 255, 0.6);
    }
    .side-item .tag {
      font-size: 10px;
      border-radius: 999px;
      padding: 2px 6px;
      background: rgba(255, 255, 255, 0.12);
      color: #cdd8e6;
      flex-shrink: 0;
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: var(--panel);
    }

    .main-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .main-header strong { font-size: 15px; }
    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: var(--primary-weak);
      color: var(--primary);
    }
    .badge.readonly {
      background: #fff2e8;
      color: #ad6800;
    }

    .content {
      min-height: 0;
      overflow: auto;
      padding: 14px;
      background: #f8fafc;
    }

    .empty {
      border: 1px dashed #c4cedb;
      border-radius: var(--radius);
      padding: 24px;
      color: var(--muted);
      background: #fff;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      display: flex;
      gap: 10px;
      max-width: 82%;
    }
    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: #8fa3bf;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--primary); }

    .bubble-wrap { min-width: 0; }
    .sender {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .bubble {
      border-radius: var(--radius);
      padding: 10px 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 1px 2px rgba(31, 41, 55, 0.08);
    }
    .msg.user .bubble { background: var(--user-bubble); }
    .msg.agent .bubble { background: var(--agent-bubble); }

    .file-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }
    .file-title {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .file-content {
      margin: 0;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      flex: 1;
    }

    .composer {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 10px 14px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      min-height: 38px;
      max-height: 120px;
      resize: none;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #fff;
    }
    textarea:focus { border-color: var(--primary); }
    .btn {
      height: 36px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-line {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #4a5565;
      cursor: pointer;
      font-size: 13px;
    }

    .attachments {
      margin-top: 8px;
      display: none;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .thumbs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .thumb {
      width: 46px;
      height: 46px;
      border-radius: 6px;
      border: 1px solid var(--line);
      overflow: hidden;
      position: relative;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .thumb .remove {
      position: absolute;
      top: 1px;
      right: 1px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 11px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .decision {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: none;
    }
    .decision p {
      margin: 0 0 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .decision .row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .decision .row button {
      height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #2f3a4a;
      cursor: pointer;
    }
    .error {
      margin-top: 8px;
      color: var(--danger);
      font-size: 12px;
      min-height: 16px;
    }

    input[type="file"] { display: none; }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 200px minmax(0, 1fr) 200px; }
    }
    @media (max-width: 760px) {
      .app { grid-template-columns: 168px minmax(0, 1fr) 168px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar left">
      <div class="side-head">Files</div>
      <div class="side-list" id="fileList"></div>
      <div class="side-foot">
        <button type="button" class="reset-btn" id="resetBtn">RESET</button>
      </div>
    </aside>

    <main class="main">
      <header class="main-header">
        <strong id="mainTitle">Ludens-Flow</strong>
        <div class="meta">
          <span class="badge" id="phaseBadge">-</span>
          <span class="badge" id="modeBadge">Agent Chat</span>
          <span class="badge readonly" id="readonlyBadge" style="display:none;">Read Only</span>
        </div>
      </header>

      <section class="content" id="contentArea"></section>

      <section class="composer" id="composer">
        <div class="input-row">
          <textarea id="input" placeholder="Input message..." rows="1"></textarea>
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/jpg" multiple>
          <button type="button" class="btn-line" id="attachBtn">Image</button>
          <button type="button" class="btn" id="sendBtn">Send</button>
        </div>
        <div class="attachments" id="attachments">
          <span style="font-size:12px;color:var(--muted);">Images:</span>
          <div class="thumbs" id="thumbs"></div>
        </div>
        <div class="decision" id="decisionBar">
          <p>Review completed. Choose next step:</p>
          <div class="row">
            <button type="button" data-choice="a">A: Full Backflow</button>
            <button type="button" data-choice="b">B: Only Block/Major</button>
            <button type="button" data-choice="c">C: Go DEV_COACHING</button>
          </div>
        </div>
        <div class="error" id="errorText"></div>
      </section>
    </main>

    <aside class="sidebar right">
      <div class="side-head">Agents</div>
      <div class="side-list" id="agentList"></div>
    </aside>
  </div>

  <script>
    const API = "";
    const AGENTS = [
      { key: "design", name: "Dam / Design" },
      { key: "pm", name: "Pax / PM" },
      { key: "engineering", name: "Eon / Engineering" },
      { key: "review", name: "Revs / Review" },
    ];

    const phaseLabel = {
      GDD_DISCUSS: "GDD Discuss",
      GDD_COMMIT: "GDD Commit",
      PM_DISCUSS: "PM Discuss",
      PM_COMMIT: "PM Commit",
      ENG_DISCUSS: "ENG Discuss",
      ENG_COMMIT: "ENG Commit",
      REVIEW: "Review",
      POST_REVIEW_DECISION: "Post Review Decision",
      DEV_COACHING: "Dev Coaching",
    };

    const stateModel = {
      phase: "",
      current_agent: "design",
      review_gate: null,
      transcript_history: [],
      chat_history: [],
      files: [],
    };
    const historyByAgent = { design: [], pm: [], engineering: [], review: [] };
    const fileCache = {};
    let currentView = { type: "agent", id: "design" };
    let pendingImages = [];

    function el(id) { return document.getElementById(id); }
    function escapeHTML(text) {
      return String(text || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function phaseToAgentKey(phase) {
      if (!phase) return "design";
      if (phase.startsWith("GDD_")) return "design";
      if (phase.startsWith("PM_")) return "pm";
      if (phase.startsWith("ENG_") || phase === "DEV_COACHING") return "engineering";
      if (phase === "REVIEW" || phase === "POST_REVIEW_DECISION") return "review";
      return "design";
    }
    function normalizeAgentKey(agent, phase) {
      const raw = String(agent || "").toLowerCase();
      if (raw.includes("design")) return "design";
      if (raw.includes("pm")) return "pm";
      if (raw.includes("engineer")) return "engineering";
      if (raw.includes("review")) return "review";
      return phaseToAgentKey(phase);
    }
    function selectedAgentName(key) {
      const hit = AGENTS.find((a) => a.key === key);
      return hit ? hit.name : key;
    }
    function isReadonlyAgentView() {
      if (currentView.type !== "agent") return true;
      return currentView.id !== stateModel.current_agent;
    }

    function rebuildAgentHistory(state) {
      Object.keys(historyByAgent).forEach((k) => { historyByAgent[k] = []; });
      const transcript = state.transcript_history || [];
      if (transcript.length > 0) {
        transcript.forEach((item) => {
          const key = normalizeAgentKey(item.agent, item.phase);
          if (!historyByAgent[key]) return;
          historyByAgent[key].push({
            role: item.role === "user" ? "user" : "assistant",
            content: String(item.content || ""),
            phase: item.phase || state.phase,
          });
        });
        return;
      }
      const fallbackKey = state.current_agent || phaseToAgentKey(state.phase);
      (state.chat_history || []).forEach((item) => {
        if (!historyByAgent[fallbackKey]) return;
        historyByAgent[fallbackKey].push({
          role: item.role === "user" ? "user" : "assistant",
          content: String(item.content || ""),
          phase: state.phase,
        });
      });
    }

    function renderAgentList() {
      const list = el("agentList");
      list.innerHTML = "";
      AGENTS.forEach((agent) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "side-item";
        if (currentView.type === "agent" && currentView.id === agent.key) btn.classList.add("active");
        const tag = agent.key === stateModel.current_agent ? "CURRENT" : "HISTORY";
        btn.innerHTML = `<span>${escapeHTML(agent.name)}</span><span class="tag">${tag}</span>`;
        btn.onclick = () => {
          currentView = { type: "agent", id: agent.key };
          renderMain();
          renderAgentList();
          renderFileList();
        };
        list.appendChild(btn);
      });
    }

    function renderFileList() {
      const list = el("fileList");
      list.innerHTML = "";
      stateModel.files.forEach((f) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "side-item";
        if (currentView.type === "file" && currentView.id === f.id) btn.classList.add("active");
        btn.innerHTML = `<span>${escapeHTML(f.name)}</span><span class="tag">FILE</span>`;
        btn.onclick = () => {
          currentView = { type: "file", id: f.id };
          renderMain();
          renderAgentList();
          renderFileList();
          loadFileContentIfNeeded(f.id);
        };
        list.appendChild(btn);
      });
    }

    function renderMessages(agentKey) {
      const rows = historyByAgent[agentKey] || [];
      if (rows.length === 0) {
        return `<div class="empty">No conversation yet for ${escapeHTML(selectedAgentName(agentKey))}.</div>`;
      }
      const html = rows.map((item) => {
        const cls = item.role === "user" ? "msg user" : "msg agent";
        const sender = item.role === "user" ? "You" : selectedAgentName(agentKey);
        const avatar = item.role === "user" ? "ME" : sender.slice(0, 1).toUpperCase();
        return `
          <div class="${cls}">
            <div class="avatar">${escapeHTML(avatar)}</div>
            <div class="bubble-wrap">
              <div class="sender">${escapeHTML(sender)} · ${escapeHTML(item.phase || "")}</div>
              <div class="bubble">${escapeHTML(item.content)}</div>
            </div>
          </div>
        `;
      }).join("");
      return `<div class="messages">${html}</div>`;
    }

    function renderFile(fileId) {
      const file = stateModel.files.find((f) => f.id === fileId);
      const title = file ? file.name : fileId;
      const content = fileCache[fileId];
      if (typeof content !== "string") {
        return `
          <div class="file-panel">
            <div class="file-title">${escapeHTML(title)}</div>
            <pre class="file-content">Loading...</pre>
          </div>
        `;
      }
      return `
        <div class="file-panel">
          <div class="file-title">${escapeHTML(title)}</div>
          <pre class="file-content">${escapeHTML(content || "(empty)")}</pre>
        </div>
      `;
    }

    function renderMain() {
      const phase = stateModel.phase || "-";
      const currentAgentName = selectedAgentName(stateModel.current_agent);
      const title = currentView.type === "agent"
        ? `Agent: ${selectedAgentName(currentView.id)}`
        : `File: ${(stateModel.files.find((f) => f.id === currentView.id) || {}).name || currentView.id}`;

      el("mainTitle").textContent = title;
      el("phaseBadge").textContent = phaseLabel[phase] || phase;
      el("modeBadge").textContent = currentView.type === "agent" ? "Agent Chat" : "File Viewer";

      const readonly = isReadonlyAgentView();
      el("readonlyBadge").style.display = currentView.type === "agent" && readonly ? "inline-flex" : "none";
      if (readonly && currentView.type === "agent") {
        el("readonlyBadge").textContent = `Read Only (Current: ${currentAgentName})`;
      }

      const contentArea = el("contentArea");
      contentArea.innerHTML = currentView.type === "agent" ? renderMessages(currentView.id) : renderFile(currentView.id);
      if (currentView.type === "agent") contentArea.scrollTop = contentArea.scrollHeight;

      const canChat = currentView.type === "agent";
      const canSend = canChat && !readonly;
      el("composer").style.display = canChat ? "block" : "none";
      el("input").disabled = !canSend;
      el("sendBtn").disabled = !canSend;
      el("attachBtn").disabled = !canSend;
      el("input").placeholder = canSend
        ? `Talk to ${selectedAgentName(currentView.id)}...`
        : `Read-only history. Current active agent is ${currentAgentName}.`;

      const needDecision = stateModel.phase === "POST_REVIEW_DECISION" && canSend;
      el("decisionBar").style.display = needDecision ? "block" : "none";
    }

    function setError(msg) {
      el("errorText").textContent = msg || "";
    }

    async function loadState() {
      const r = await fetch(API + "/api/state");
      const s = await r.json();
      stateModel.phase = s.phase || "";
      stateModel.current_agent = s.current_agent || phaseToAgentKey(s.phase);
      stateModel.review_gate = s.review_gate || null;
      stateModel.transcript_history = s.transcript_history || [];
      stateModel.chat_history = s.chat_history || [];
      rebuildAgentHistory(stateModel);
    }

    async function loadFileList() {
      const r = await fetch(API + "/api/workspace/files");
      const data = await r.json();
      stateModel.files = data.files || [];
    }

    async function loadFileContentIfNeeded(fileId) {
      if (fileCache[fileId] !== undefined) return;
      try {
        const r = await fetch(`${API}/api/workspace/files/${encodeURIComponent(fileId)}/content`);
        const d = await r.json();
        fileCache[fileId] = d.content || "";
      } catch (err) {
        fileCache[fileId] = `Load failed: ${err.message}`;
      }
      if (currentView.type === "file" && currentView.id === fileId) renderMain();
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function renderThumbs() {
      const wrap = el("attachments");
      const box = el("thumbs");
      box.innerHTML = "";
      pendingImages.forEach((dataUrl, idx) => {
        const div = document.createElement("div");
        div.className = "thumb";
        div.innerHTML = `<img src="${dataUrl}" alt=""><button type="button" class="remove">x</button>`;
        div.querySelector(".remove").onclick = () => {
          pendingImages.splice(idx, 1);
          renderThumbs();
        };
        box.appendChild(div);
      });
      wrap.style.display = pendingImages.length ? "flex" : "none";
    }

    async function sendMessage(message) {
      if (currentView.type !== "agent") return;
      if (isReadonlyAgentView()) {
        setError("This agent is read-only now. Switch to current active agent to continue.");
        return;
      }
      const text = String(message || "").trim();
      const hasImages = pendingImages.length > 0;
      if (!text && !hasImages) return;

      setError("");
      el("sendBtn").disabled = true;

      const body = { message: text };
      if (hasImages) body.images = pendingImages.slice();
      pendingImages = [];
      renderThumbs();
      el("input").value = "";

      try {
        const r = await fetch(API + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (d.error) setError(d.error);
        await loadState();
        await loadFileList();
        renderAgentList();
        renderFileList();
        renderMain();
      } catch (err) {
        setError("Request failed: " + err.message);
      } finally {
        if (!isReadonlyAgentView()) el("sendBtn").disabled = false;
      }
    }

    async function sendChoice(choice) {
      await sendMessage(choice);
    }

    async function resetSession() {
      const ok = confirm("Reset current session? This will clear state and images.");
      if (!ok) return;
      await fetch(API + "/api/reset", { method: "POST" });
      Object.keys(fileCache).forEach((k) => delete fileCache[k]);
      pendingImages = [];
      renderThumbs();
      setError("");

      await loadState();
      await loadFileList();
      currentView = { type: "agent", id: stateModel.current_agent };
      renderAgentList();
      renderFileList();
      renderMain();
    }

    function bindEvents() {
      el("sendBtn").addEventListener("click", () => sendMessage(el("input").value));
      el("input").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage(el("input").value);
        }
      });
      el("attachBtn").addEventListener("click", () => el("fileInput").click());
      el("fileInput").addEventListener("change", async function () {
        const files = Array.from(this.files || []);
        this.value = "";
        for (const f of files) {
          if (!f.type.startsWith("image/")) continue;
          try { pendingImages.push(await readFileAsDataUrl(f)); } catch (_) {}
        }
        renderThumbs();
      });
      el("resetBtn").addEventListener("click", resetSession);
      el("decisionBar").querySelectorAll("button[data-choice]").forEach((btn) => {
        btn.addEventListener("click", () => sendChoice(btn.dataset.choice));
      });
    }

    async function init() {
      bindEvents();
      await loadState();
      await loadFileList();
      currentView = { type: "agent", id: stateModel.current_agent };
      renderAgentList();
      renderFileList();
      renderMain();
    }

    init();
  </script>
</body>
</html>
