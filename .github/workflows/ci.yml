name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e agent_workbench

      - name: Run Python tests
        run: python -m unittest discover -s agent_workbench/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent_workbench/web/package-lock.json

      - name: Install web dependencies
        working-directory: agent_workbench/web
        run: npm ci

      - name: Build web
        working-directory: agent_workbench/web
        run: npm run build
